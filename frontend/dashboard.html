<script>
fetch("/api/status", {
  headers: {
    "authorization": localStorage.getItem("token")
  }
})
.then(res => res.json())
.then(status => {

  if (status.status === "not_checked_in" && location.pathname.includes("checkin")) return;
  if (status.status === "checked_in" && location.pathname.includes("checkout")) return;
  if (status.status === "completed" && location.pathname.includes("done")) return;

  // ❌ 状态不匹配 → 重定向
  location.href = "index.html";
});
</script>
